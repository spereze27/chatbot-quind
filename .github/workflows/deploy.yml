name: Deploy Chatbot-Quind to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID:       ${{ secrets.GCP_PROJECT_ID }}
  REGION:           us-central1
  SERVICE_BOT:      quindbot-service          # WhatsApp bot (app.js)
  SERVICE_WEB:      gran-bancolombia-service  # Portal web  (server.js)
  BUCKET_SESSION:   bkt-wa-session-data
  # Definimos la base de la imagen a nivel global para usarla en todos los jobs
  IMAGE_BASE:       gcr.io/${{ secrets.GCP_PROJECT_ID }}/chatbot-quind
  

jobs:
  build:
    name: 🏗️ Build imagen compartida
    runs-on: ubuntu-latest
    # Eliminamos el bloque 'outputs', ya no es necesario
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 🐳 Build & Push (Cloud Build)
        run: |
          # Usamos la variable global + el SHA del commit
          gcloud builds submit --tag "${{ env.IMAGE_BASE }}:${{ github.sha }}" .

  deploy-bot:
    name: 🤖 Deploy QuindBot (WhatsApp)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 🚀 Deploy quindbot-service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_BOT }}
          region:  ${{ env.REGION }}
          # Construimos la imagen localmente, garantizando que nunca llegue vacía
          image:   ${{ env.IMAGE_BASE }}:${{ github.sha }}
          flags: |
            --min-instances=1
            --no-cpu-throttling
            --add-volume=name=wa-session,type=cloud-storage,bucket=${{ env.BUCKET_SESSION }}
            --add-volume-mount=volume=wa-session,mount-path=/usr/src/app/sesion_wa_limpia
            --service-account=vertex-whatsapp-bot@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          env_vars: |
            APP_MODE=bot
            PROJECT_ID=${{ env.PROJECT_ID }}
            DATA_STORE_ID=${{ secrets.DATA_STORE_ID }}

  deploy-web:
    name: 🌐 Deploy La Gran Bancolombia (Portal)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 🚀 Deploy gran-bancolombia-service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_WEB }}
          region:  ${{ env.REGION }}
          image:   ${{ env.IMAGE_BASE }}:${{ github.sha }}
          flags: |
            --min-instances=1
            --no-cpu-throttling
            --allow-unauthenticated
            --service-account=vertex-whatsapp-bot@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          env_vars: |
            APP_MODE=web
            PROJECT_ID=${{ env.PROJECT_ID }}
            BOT_INTERNAL_URL=${{ secrets.BOT_INTERNAL_URL }}

      - name: 🌐 URL del portal
        run: |
          gcloud run services describe ${{ env.SERVICE_WEB }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)'